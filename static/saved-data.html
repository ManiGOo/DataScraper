<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Database Results - GitHub Data Scraper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container" style="padding-top: 3rem; max-width: 1200px;">
        <div class="glass-card">
            <div class="card-header">
                <h2>💾 Database Saved Candidate Profiles (Neon DB)</h2>
                <a href="/" class="btn-nav-action" style="text-decoration: none;">&larr; Back to Dashboard</a>
            </div>
            
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>LinkedIn URL</th>
                            <th>GitHub Profile</th>
                            <th>Repos</th>
                            <th>Query & Date</th>
                        </tr>
                    </thead>
                    <tbody id="savedDataTableBody">
                        <tr><td colspan="7" style="text-align: center; color: var(--text-secondary); padding: 2rem;">Loading stored database records...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const authToken = localStorage.getItem('datascraper_token');
        if (!authToken) {
            window.location.href = '/login';
        }

        async function loadSavedData() {
            const tableBody = document.getElementById('savedDataTableBody');
            try {
                const response = await fetch('/api/user/saved-results', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) throw new Error('Failed to load saved database results');
                const savedData = await response.json();

                if (savedData.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--text-secondary); padding: 2rem;">No saved candidate profile records in database.</td></tr>`;
                    return;
                }

                tableBody.innerHTML = savedData.map((row, idx) => {
                    const name = row.name || 'N/A';
                    const emailHtml = (row.email && row.email !== 'N/A') 
                        ? `<span class="badge-email">${row.email}</span>` 
                        : `<span class="badge-na">N/A</span>`;

                    const linkedinHtml = (row.linkedin_url && row.linkedin_url !== 'N/A') 
                        ? `<a href="${row.linkedin_url}" target="_blank" class="badge-linkedin">View Profile ↗</a>` 
                        : `<span class="badge-na">N/A</span>`;

                    const githubHtml = `<a href="${row.github_url}" target="_blank" class="link-github">${row.github_url}</a>`;
                    const repos = row.repositories || '0';
                    const queryDate = `${row.query}<br><small style="color: var(--text-secondary);">${row.created_at}</small>`;

                    return `
                        <tr>
                            <td>${idx + 1}</td>
                            <td><strong>${name}</strong></td>
                            <td>${emailHtml}</td>
                            <td>${linkedinHtml}</td>
                            <td>${githubHtml}</td>
                            <td>${repos}</td>
                            <td>${queryDate}</td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                tableBody.innerHTML = `<tr><td colspan="7" style="color: #EF4444; padding: 2rem; text-align: center;">Error: ${err.message}</td></tr>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadSavedData);
    </script>
</body>
</html>
