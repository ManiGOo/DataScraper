<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Data Scraper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .auth-page-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
        }
        .auth-title {
            text-align: center;
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #FFFFFF 0%, #CBD5E1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .auth-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--accent-cyan);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .auth-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container auth-page-container">
        <div class="auth-card">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Login to access your GitHub Data Scraper</p>
            
            <form id="loginForm" onsubmit="handleLoginSubmit(event)">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" required placeholder="user@example.com">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>

                <button type="submit" id="btnLoginSubmit" class="btn-primary" style="margin-top: 1.5rem;">
                    <span>Login</span>
                </button>
            </form>

            <a href="/signup" class="auth-link">Don't have an account? Sign up here</a>
        </div>
    </div>

    <script>
        // If already logged in, redirect to home
        if (localStorage.getItem('datascraper_token')) {
            window.location.href = '/';
        }

        async function handleLoginSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btnSubmit = document.getElementById('btnLoginSubmit');

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<span>Authenticating...</span>`;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Authentication failed');
                }

                localStorage.setItem('datascraper_token', data.token);
                window.location.href = '/';

            } catch (err) {
                alert("Login Error: " + err.message);
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<span>Login</span>`;
            }
        }
    </script>
</body>
</html>
